# Demo card usage: docs/dashboard-demo.md
type: vertical-stack
cards:
  - type: markdown
    title: The Weather Company
    content: |-
      {% set entity = 'weather.twc' %}
      {% set condition = states(entity) %}
      {% set condition_labels = {
        'clear-night': 'Clear Night',
        'cloudy': 'Cloudy',
        'exceptional': 'Exceptional',
        'fog': 'Fog',
        'hail': 'Hail',
        'lightning': 'Lightning',
        'lightning-rainy': 'Thunderstorms',
        'partlycloudy': 'Partly Cloudy',
        'pouring': 'Pouring',
        'rainy': 'Rainy',
        'snowy': 'Snowy',
        'snowy-rainy': 'Wintry Mix',
        'sunny': 'Sunny',
        'windy': 'Windy',
        'windy-variant': 'Windy'
      } %}
      {% set condition_label = condition_labels.get(condition, condition | replace('_', ' ') | replace('-', ' ') | title) %}
      {% set temp = state_attr(entity, 'temperature') %}
      {% set apparent = state_attr(entity, 'apparent_temperature') %}
      {% set attribution = state_attr(entity, 'attribution') %}

      # {{ temp if temp is not none else '--' }}° {{ condition_label }}

      **The Weather Company** weather entity is live as `{{ entity }}`

      {% if apparent is not none %}
      Feels like **{{ apparent }}°**.
      {% endif %}

      {% if attribution %}
      {{ attribution }}
      {% endif %}

      <ha-alert alert-type="success">API live · Current conditions · 2-day hourly · 7-day daily</ha-alert>

  - type: grid
    title: Current Conditions
    columns: 1
    square: false
    cards:
      - type: markdown
        content: |-
          {% set entity = 'weather.twc' %}
          {% set humidity = state_attr(entity, 'humidity') %}
          {% set pressure = state_attr(entity, 'pressure') %}
          {% set pressure_unit = state_attr(entity, 'pressure_unit') or '' %}
          {% set visibility = state_attr(entity, 'visibility') %}
          {% set visibility_unit = state_attr(entity, 'visibility_unit') or '' %}
          {% set wind_speed = state_attr(entity, 'wind_speed') %}
          {% set wind_speed_unit = state_attr(entity, 'wind_speed_unit') or '' %}
          {% set wind_bearing = state_attr(entity, 'wind_bearing') %}
          ### Atmosphere

          | Metric | Value |
          | --- | ---: |
          | Humidity | {{ humidity ~ '%' if humidity is not none else 'Unavailable' }} |
          | Pressure | {{ pressure ~ ' ' ~ pressure_unit if pressure is not none else 'Unavailable' }} |
          | Visibility | {{ visibility ~ ' ' ~ visibility_unit if visibility is not none else 'Unavailable' }} |
          | Wind | {{ wind_speed ~ ' ' ~ wind_speed_unit if wind_speed is not none else 'Unavailable' }} · {{ wind_bearing if wind_bearing is not none else 'Unavailable' }} |

      - type: markdown
        content: |-
          {% set entity = 'weather.twc' %}
          {% set dew_point = state_attr(entity, 'dew_point') %}
          {% set cloud_coverage = state_attr(entity, 'cloud_coverage') %}
          {% set uv_index = state_attr(entity, 'uv_index') %}
          {% set wind_gust = state_attr(entity, 'wind_gust_speed') %}
          {% set wind_speed_unit = state_attr(entity, 'wind_speed_unit') or '' %}
          ### Comfort & Sky

          | Metric | Value |
          | --- | ---: |
          | Dew point | {{ dew_point ~ '°' if dew_point is not none else 'Unavailable' }} |
          | Cloud cover | {{ cloud_coverage ~ '%' if cloud_coverage is not none else 'Unavailable' }} |
          | UV index | {{ uv_index if uv_index is not none else 'Unavailable' }} |
          | Wind gust | {{ wind_gust ~ ' ' ~ wind_speed_unit if wind_gust is not none else 'Unavailable' }} |

  - type: markdown
    title: Integration Coverage
    content: |-
      | Capability | Status |
      | --- | --- |
      | Current conditions | Shipped |
      | 2-day hourly forecast | Shipped |
      | 7-day daily forecast | Shipped |
      | Weather alerts | Planned milestone |
      | Optional extra weather entities | Planned milestone |

  - type: grid
    title: Forecast Demo
    columns: 1
    square: false
    cards:
      - type: weather-forecast
        entity: weather.twc
        name: Hourly Forecast
        forecast_type: hourly
        show_current: false
        show_forecast: true

      - type: weather-forecast
        entity: weather.twc
        name: Daily Forecast
        forecast_type: daily
        show_current: false
        show_forecast: true

  - type: markdown
    title: Daily Enrichment
    content: |-
      Daily forecast rows are enriched by the integration where Home Assistant supports the fields:
      high and low temperature, condition, precipitation chance, precipitation amount,
      wind, humidity, cloud cover, apparent temperature, and UV index.

      Planned milestones are intentionally shown as roadmap labels only.
