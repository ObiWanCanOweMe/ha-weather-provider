# Demo docs: docs/weather-card-gallery.md
title: TWC Card Gallery
path: default_view
type: sections
max_columns: 3
sections:
- type: grid
  title: Overview
  cards:
  - type: markdown
    title: TWC Weather Card Gallery
    content: |-
      {% set entity = 'weather.twc' %}
      {% set temp = state_attr(entity, 'temperature') %}
      {% set apparent = state_attr(entity, 'apparent_temperature') %}
      {% set version = state_attr(entity, 'integration_version') %}
      {% set alert_count = state_attr(entity, 'alert_count') %}

      # The Weather Company Card Gallery

      **Entity:** `{{ entity }}`

      **Current:** {{ states(entity) | replace('-', ' ') | title }} · {{ temp if temp is not none else 'Unavailable' }}°

      {% if apparent is not none %}
      **Feels like:** {{ apparent }}°
      {% endif %}

      **Active alerts:** {{ alert_count if alert_count is not none else 'Unavailable' }}

      **Integration release:** v{{ version if version is not none else 'unknown' }}

      This gallery maps popular Home Assistant weather cards to TWC data where possible.
  - type: markdown
    title: Compatibility Summary
    content: |-
      | Card | Status | Primary Source |
      | --- | --- | --- |
      | Home Assistant Weather Forecast Card | Live | `weather.twc` |
      | Simple Weather Card | Installed via HACS | `weather.twc` |
      | Hourly Weather Card | Installed via HACS | `weather.twc` hourly forecast |
      | Animated Weather Card | Requires adapter entities | optional `sensor.twc_*` sensors |
      | Weather Radar Card | Requires non-TWC source | RainViewer radar tiles |
      | Clock Weather Card | Installed via HACS | `weather.twc`, `sun.sun` |
      | Meteoalarm Card | Adapter needed | TWC alert summary |
      | Lovelace Horizon Card | Requires non-TWC source | Home Assistant sun/moon context |
      | Weather Conditions Card | Requires adapter entities | optional `sensor.twc_*` sensors |
      | Platinum Weather Card | Requires adapter entities | `weather.twc`, optional `sensor.twc_*` sensors |
- type: grid
  title: Home Assistant Weather Forecast Card
  cards:
  - type: markdown
    title: Home Assistant Weather Forecast Card
    content: |-
      Status: **Live**

      Built-in Home Assistant card using `weather.twc`.
  - type: weather-forecast
    entity: weather.twc
    name: Home Assistant Weather Forecast Card
    forecast_type: daily
    show_current: true
    show_forecast: true
- type: grid
  title: Simple Weather Card
  cards:
  - type: markdown
    title: Simple Weather Card
    content: |-
      Status: **Installed via HACS**

      Uses `weather.twc` directly through the HACS-managed `custom:simple-weather-card` resource.
  - type: custom:simple-weather-card
    entity: weather.twc
    name: The Weather Company
    primary_info:
    - wind_bearing
    - humidity
    secondary_info:
    - precipitation
    - precipitation_probability
- type: grid
  title: Hourly Weather Card
  cards:
  - type: markdown
    title: Hourly Weather Card
    content: |-
      Status: **Installed via HACS**

      Uses the hourly forecast exposed by `weather.twc` through the HACS-managed `custom:hourly-weather` resource.
  - type: custom:hourly-weather
    entity: weather.twc
    icons: true
    show_precipitation_amounts: true
    show_wind: barb
    num_segments: '14'
- type: grid
  title: Clock Weather Card
  cards:
  - type: markdown
    title: Clock Weather Card
    content: |-
      Status: **Installed via HACS**

      Uses `weather.twc` for forecast data and `sun.sun` for sun context through the HACS-managed `custom:clock-weather-card` resource.
  - type: custom:clock-weather-card
    entity: weather.twc
    sun_entity: sun.sun
    weather_icon_type: line
    animated_icon: true
    forecast_rows: 5
    locale: en-US
    time_format: 12
    hide_today_section: false
    hide_forecast_section: false
- type: grid
  title: Animated Weather Card
  cards:
  - type: markdown
    title: Animated Weather Card
    content: |-
      Status: **Requires adapter entities**

      This card family expects many sensor-style inputs. Current conditions and forecast rows use optional adapter sensors from the integration.
  - type: custom:bom-weather-card
    title: Animated Weather Card
    locale: en-US
    entity_current_conditions: sensor.twc_condition_phrase
    entity_current_text: sensor.twc_condition_phrase
    entity_temperature: sensor.twc_temperature
    entity_apparent_temp: sensor.twc_feels_like_temperature
    entity_humidity: sensor.twc_humidity
    entity_pressure: sensor.twc_pressure
    entity_wind_bearing: sensor.twc_wind_bearing
    entity_wind_speed: sensor.twc_wind_speed
    entity_wind_gust: sensor.twc_wind_gust
    entity_forecast_icon_1: sensor.twc_daily_forecast_day_1_condition
    entity_forecast_high_temp_1: sensor.twc_daily_forecast_day_1_high
    entity_forecast_low_temp_1: sensor.twc_daily_forecast_day_1_low
    entity_pop_1: sensor.twc_daily_forecast_day_1_precip_probability
    entity_pos_1: sensor.twc_daily_forecast_day_1_precip_amount
    entity_summary_1: sensor.twc_daily_forecast_day_1_summary
    entity_forecast_icon_2: sensor.twc_daily_forecast_day_2_condition
    entity_forecast_high_temp_2: sensor.twc_daily_forecast_day_2_high
    entity_forecast_low_temp_2: sensor.twc_daily_forecast_day_2_low
    entity_pop_2: sensor.twc_daily_forecast_day_2_precip_probability
    entity_pos_2: sensor.twc_daily_forecast_day_2_precip_amount
    entity_summary_2: sensor.twc_daily_forecast_day_2_summary
    entity_forecast_icon_3: sensor.twc_daily_forecast_day_3_condition
    entity_forecast_high_temp_3: sensor.twc_daily_forecast_day_3_high
    entity_forecast_low_temp_3: sensor.twc_daily_forecast_day_3_low
    entity_pop_3: sensor.twc_daily_forecast_day_3_precip_probability
    entity_pos_3: sensor.twc_daily_forecast_day_3_precip_amount
    entity_summary_3: sensor.twc_daily_forecast_day_3_summary
    entity_forecast_icon_4: sensor.twc_daily_forecast_day_4_condition
    entity_forecast_high_temp_4: sensor.twc_daily_forecast_day_4_high
    entity_forecast_low_temp_4: sensor.twc_daily_forecast_day_4_low
    entity_pop_4: sensor.twc_daily_forecast_day_4_precip_probability
    entity_pos_4: sensor.twc_daily_forecast_day_4_precip_amount
    entity_summary_4: sensor.twc_daily_forecast_day_4_summary
    entity_forecast_icon_5: sensor.twc_daily_forecast_day_5_condition
    entity_forecast_high_temp_5: sensor.twc_daily_forecast_day_5_high
    entity_forecast_low_temp_5: sensor.twc_daily_forecast_day_5_low
    entity_pop_5: sensor.twc_daily_forecast_day_5_precip_probability
    entity_pos_5: sensor.twc_daily_forecast_day_5_precip_amount
    entity_summary_5: sensor.twc_daily_forecast_day_5_summary
    slot_l1: wind
    slot_l2: humidity
    slot_l3: pressure
    slot_l4: empty
    slot_l5: empty
    slot_r1: empty
    slot_r2: empty
    slot_r3: empty
    slot_r4: empty
    slot_r5: empty
- type: grid
  title: Platinum Weather Card
  cards:
  - type: markdown
    title: Platinum Weather Card
    content: |-
      Status: **Requires adapter entities**

      Uses `weather.twc` where supported and adapter sensors for detailed slots.
  - type: custom:platinum-weather-card
    card_config_version: 8
    entity: weather.twc
    entity_forecast_icon: weather.twc
    entity_summary: sensor.twc_condition_phrase
    entity_temperature: sensor.twc_temperature
    option_show_overview_decimals: true
    option_show_overview_separator: false
    overview_layout: complete
    section_order:
    - overview
    - extended
    - slots
    - daily_forecast
    show_section_overview: true
    text_card_title: Weather
    text_card_title_2: TWC
- type: grid
  title: Weather Conditions Card
  cards:
  - type: markdown
    title: Weather Conditions Card
    content: |-
      Status: **Requires adapter entities**

      Advanced weather-station style card. TWC can provide core weather values, optional pollen sensors, and optional air quality sensors. Meteogram data is not currently exposed by this integration.
  - type: custom:ha-card-weather-conditions
    name: Weather Conditions Card
    language: en
    weather:
      icons_model: climacell
      animation: true
      sun: sun.sun
      present:
        condition: sensor.twc_condition_phrase
        temperature: sensor.twc_temperature
        temperature_feelslike: sensor.twc_feels_like_temperature
        humidity: sensor.twc_humidity
        pressure: sensor.twc_pressure
        wind_speed: sensor.twc_wind_speed
- type: grid
  title: Meteoalarm Card
  cards:
  - type: markdown
    title: Meteoalarm Card
    content: |-
      Status: **Adapter needed**

      The article card targets supported alert integrations such as Meteoalarm, DWD, NINA, Environment Canada, and WeatherAlerts. TWC alert headline data is available, but the card needs a TWC-to-supported-alert adapter before `custom:meteoalarm-card` can render valid TWC alerts.
  - type: entities
    title: TWC Alert Data for Future Meteoalarm Adapter
    entities:
    - sensor.twc_alert_count
- type: grid
  title: Lovelace Horizon Card
  cards:
  - type: markdown
    title: Lovelace Horizon Card
    content: |-
      Status: **Requires non-TWC source**

      Uses Home Assistant's `sun.sun` integration. Useful weather-dashboard context, but not TWC-backed.
  - type: custom:horizon-card
    title: Lovelace Horizon Card
    moon: true
    fields:
      sunrise: true
      sunset: true
      dawn: true
      noon: true
      dusk: true
      sun_azimuth: true
      sun_elevation: true
- type: grid
  title: Weather Radar Card
  cards:
  - type: markdown
    title: Weather Radar Card
    content: |-
      Status: **Requires non-TWC source**

      The Weather Radar Card uses RainViewer map tiles. This is useful context but not TWC-backed.
  - type: custom:weather-radar-card
    frame_count: 10
    center_latitude: 33.931
    center_longitude: -84.4677
    marker_latitude: 33.931
    marker_longitude: -84.4677
    show_marker: true
    show_range: true
    show_zoom: true
    show_recenter: true
    show_playback: true
    zoom_level: 8
