stages:
  - test
  - mirror

project-check:
  stage: test
  image: python:3.14-slim
  tags:
    - docker
  before_script:
    - python3 -m venv .ci-venv
    - .ci-venv/bin/python -m pip install --upgrade pip
    - .ci-venv/bin/python -m pip install -r requirements-dev.txt
  script:
    - .ci-venv/bin/python -m compileall custom_components/ha_weather_provider
    - .ci-venv/bin/python -m json.tool custom_components/ha_weather_provider/manifest.json
    - .ci-venv/bin/python -m json.tool custom_components/ha_weather_provider/strings.json
    - .ci-venv/bin/python -m json.tool custom_components/ha_weather_provider/translations/en.json
    - .ci-venv/bin/python -m pytest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

sync-github:
  stage: mirror
  image: alpine/git:latest
  tags:
    - docker
  needs:
    - project-check
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: "0"
  script:
    - test -n "$GITHUB_SYNC_REPOSITORY"
    - test -n "$GITHUB_SYNC_TOKEN"
    - git config user.name "GitLab CI"
    - git config user.email "gitlab-ci@git.kener.org"
    - git remote add github "https://x-access-token:${GITHUB_SYNC_TOKEN}@github.com/${GITHUB_SYNC_REPOSITORY}.git"
    - export GITHUB_SYNC_BRANCH="${GITHUB_SYNC_BRANCH:-$CI_DEFAULT_BRANCH}"
    - git push github "HEAD:refs/heads/${GITHUB_SYNC_BRANCH}"
    - git push github --tags
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $GITHUB_SYNC_REPOSITORY && $GITHUB_SYNC_TOKEN'
